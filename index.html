<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Made For KruSom - Purple Memories</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Dancing+Script:wght@700&family=Itim&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        body, html {
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh;
            background-color: #000; overflow: hidden;
            font-family: 'Itim', cursive; color: white;
        }

        /* พื้นหลัง Matrix */
        #matrix {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1; display: none; /* จะโชว์ตอนเริ่มนับถอยหลัง */
        }

        /* หน้าล็อก */
        #lockBox {
            position: fixed; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 1000; background: #000;
        }

        /* หน้านับถอยหลัง */
        #countdownOverlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: none; justify-content: center;
            align-items: center; z-index: 500; font-size: 120px;
            color: #ffffff; text-shadow: 0 0 20px #b388ff, 0 0 40px #b388ff;
            background: rgba(0, 0, 0, 0.4); 
        }

        input {
            padding: 15px; font-size: 18px; border-radius: 10px; border: 2px solid #b388ff;
            text-align: center; width: 220px; background: #111; color: white; margin: 10px;
            outline: none; box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
        }

        .btn-open {
            padding: 12px 30px; font-size: 18px; border: none; border-radius: 50px;
            background: #b388ff; color: white; cursor: pointer; transition: 0.3s;
        }

        #mainContent {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: none; justify-content: center; align-items: flex-start; /* เปลี่ยนเป็น flex-start เผื่อเนื้อหายาว */
            z-index: 20; overflow-y: auto; /* ยอมให้เลื่อนดูเนื้อหาภายในได้ */
            pointer-events: auto; 
            padding-top: 20px; /* เพิ่ม padding บนเล็กน้อย */
            padding-bottom: 20px; /* เพิ่ม padding ล่าง */
        }

        .card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            border: 2px solid rgba(179, 136, 255, 0.4); border-radius: 25px;
            padding: 25px; text-align: center; width: 85%; max-width: 350px;
            box-shadow: 0 0 30px rgba(179, 136, 255, 0.2);
            margin-bottom: 20px; /* เพิ่ม margin ท้ายการ์ด */
        }

        .profile { width: 140px; height: 140px; border-radius: 50%; border: 4px solid #b388ff; object-fit: cover; margin-bottom: 10px; }
        .btn-action { padding: 10px 18px; margin: 5px; border: none; border-radius: 20px; background: #b388ff; color: white; cursor: pointer; font-family: 'Itim'; font-size: 15px; }

        #giftText, #letter {
            display: none; background: rgba(0,0,0,0.6); padding: 12px;
            border-radius: 12px; margin-top: 10px; font-size: 15px; 
            border: 1px dashed #b388ff; color: #e1bee7;
        }

        /* ส่วนของแกลเลอรีรูปภาพ */
        .memory-section {
            margin-top: 30px;
            text-align: center;
        }
        .memory-title {
            color: #b388ff;
            font-size: 20px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(179, 136, 255, 0.5);
        }
        .memory-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        .memory-grid img {
            width: calc(33.33% - 10px);
            max-width: 100px;
            aspect-ratio: 1/1; /* บังคับให้เป็นสี่เหลี่ยมจัตุรัส */
            object-fit: cover; /* ตัดส่วนเกินเพื่อให้เต็มรูป */
            border-radius: 10px;
            border: 2px solid #b388ff;
            box-shadow: 0 0 10px rgba(179, 136, 255, 0.3);
            transition: 0.3s;
        }
        .memory-grid img:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(179, 136, 255, 0.6);
        }

        .heart-float { position: fixed; bottom: -20px; color: #d1c4e9; animation: floatUp 4s linear forwards; z-index: 25; pointer-events: none; }
        @keyframes floatUp { to { transform: translateY(-110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <div id="lockBox">
        <h2 style="color: #b388ff;">🔐 ใส่รหัสลับเพื่อเปิด</h2>
        <input id="passwordInput" type="number" placeholder="ใส่รหัสที่นี่">
        <button class="btn-open" onclick="checkPassword()">เปิดกล่องเซอร์ไพรส์</button>
        <p style="font-size: 12px; color: #666; margin-top: 10px;">คำใบ้: วันเกิด + เดือนเกิด + อายุ (190335)</p>
    </div>

    <div id="countdownOverlay"></div>

    <canvas id="matrix"></canvas>

    <div id="mainContent">
        <div class="card">
            <h1 id="typewriter" style="color: #b388ff; font-family: 'Dancing Script'; font-size: 28px; min-height: 35px;"></h1>
            <img src="https://www.gifcen.com/wp-content/uploads/2024/12/happy-birthday-gif-5.gif" class="profile">
            
            <div>
                <button class="btn-action" onclick="showGift()">เปิดของขวัญ 🎁</button>
                <button class="btn-action" onclick="showLetter()">เปิดจดหมาย 💌</button>
            </div>

            <div id="giftText"> สุขสันต์วันเกิดนะคะครูส้ม 🎂 ขอให้ครูส้มมีความสุขมากๆ สุขภาพแข็งแรง แล้วก็ยิ้มเยอะๆนะคะ 💜 </div>
            <div id="letter"> แอ๊นท์ตี้รักครูส้มนะคะะ ❤️ </div>

            <div class="memory-section">
                <div class="memory-title">✨ For you Kru Som</div>
                <div class="memory-grid">
                    <img src="https://image2url.com/r2/default/images/1773802907204-91533219-7a49-443a-94d1-424a3c7015bf.jpeg" alt="Memory 1">
                    <img src="https://image2url.com/r2/default/images/1773803138227-414ef1e2-5080-4fff-bbd3-8137e15d0fd8.jpeg" alt="Memory 2">
                    <img src="https://image2url.com/r2/default/images/1773803236702-d038f1a3-1fae-4e06-9e13-1c6cb7bb181a.jpeg" alt="Memory 3">
                </div>
            </div>
        </div>
    </div>

    <audio id="hbdMusic" loop preload="auto">
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <script>
        const correctPassword = "190335"; 
        const audio = document.getElementById('hbdMusic');
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        function checkPassword() {
            let input = document.getElementById("passwordInput").value;
            if (input === correctPassword) {
                document.getElementById("lockBox").style.display = "none";
                // เริ่ม Matrix ตั้งแต่ตรงนี้!
                canvas.style.display = "block";
                resizeCanvas();
                startMatrix();
                startCountdown(); 
            } else {
                alert("รหัสไม่ถูกนะจ๊ะ ลองใหม่ค่ะ 💜");
            }
        }

        function startCountdown() {
            const overlay = document.getElementById("countdownOverlay");
            overlay.style.display = "flex";
            let count = 3;
            overlay.innerText = count;

            let timer = setInterval(() => {
                count--;
                if (count > 0) {
                    overlay.innerText = count;
                } else {
                    clearInterval(timer);
                    overlay.innerText = "💜";
                    setTimeout(() => {
                        overlay.style.display = "none";
                        showMainPage();
                    }, 800);
                }
            }, 1000);
        }

        function showMainPage() {
            document.getElementById("mainContent").style.display = "flex";
            audio.play().catch(e => console.log("Audio play failed"));
            typeWriter();
            setInterval(spawnHeart, 600);
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);

        function startMatrix() {
            const letters = "HAPPYBIRTHDAYKRUSOM✨💜";
            const fontSize = 16;
            const columns = canvas.width / fontSize;
            const drops = Array(Math.floor(columns)).fill(1);

            function draw() {
                ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#b388ff"; 
                ctx.font = fontSize + "px monospace";
                drops.forEach((y, i) => {
                    const text = letters[Math.floor(Math.random() * letters.length)];
                    ctx.fillText(text, i * fontSize, y * fontSize);
                    if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                });
            }
            setInterval(draw, 35);
        }

        let messageText = "Happy Birthday, Krusom! 💜";
        let charIndex = 0;
        function typeWriter() {
            if (charIndex < messageText.length) {
                document.getElementById("typewriter").innerHTML += messageText.charAt(charIndex);
                charIndex++;
                setTimeout(typeWriter, 120);
            }
        }

        function showGift() { document.getElementById("giftText").style.display = "block"; confetti(); }
        function showLetter() { document.getElementById("letter").style.display = "block"; }

        function spawnHeart() {
            const h = document.createElement('div');
            h.classList.add('heart-float');
            h.innerHTML = "💜";
            h.style.left = Math.random() * 100 + "vw";
            h.style.fontSize = (Math.random() * 20 + 10) + "px";
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 4000);
        }
    </script>
</body>
</html>
